<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitScout - AI GitHub Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Space Grotesk"', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            colors: {
              background: 'var(--background)',
              surface: 'var(--surface)',
              border: 'var(--border)',
              primary: 'var(--primary)',
              secondary: 'var(--secondary)',
              text: 'var(--text)',
              accent: 'var(--accent)',
            },
            boxShadow: {
              brutal: '4px 4px 0px 0px var(--accent)',
              'brutal-sm': '2px 2px 0px 0px var(--accent)',
              'brutal-lg': '8px 8px 0px 0px var(--accent)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --background: #050505;
        --surface: #111111;
        --border: #333333;
        --primary: #FF4F00;
        --secondary: #888888;
        --text: #F0F0F0;
        --accent: #FF4F00;
      }
      
      body {
        background-color: var(--background);
        color: var(--text);
        font-family: 'Space Grotesk', sans-serif;
        background-image: 
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 40px 40px;
        background-position: center center;
        background-attachment: fixed;
      }

      /* Noise Overlay */
      body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0.04;
        pointer-events: none;
        z-index: 50;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: var(--background); 
        border-left: 1px solid var(--border);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border); 
        border: 1px solid var(--background);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--primary); 
      }

      /* Brutalist Utilities */
      .brutal-border {
        border: 1px solid var(--border);
      }
      .brutal-shadow {
        box-shadow: 4px 4px 0px 0px var(--accent);
        transition: transform 0.1s, box-shadow 0.1s;
      }
      .brutal-shadow:hover {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0px 0px var(--accent);
      }
      .brutal-shadow:active {
        transform: translate(4px, 4px);
        box-shadow: 0px 0px 0px 0px var(--accent);
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.43.0",
    "lucide-react": "https://esm.sh/lucide-react@0.344.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
